<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <div class="site-wrapper">
    {% include nav.html %}

    <main class="site-content">
      {% if page.title %}
      <div class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </div>
      {% endif %}

      <div class="page-body">
        {{ content }}
      </div>
    </main>
  </div>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
