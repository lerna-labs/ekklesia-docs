<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <style>
    /* Override site styles for full-width spec rendering */
    .site-wrapper { display: block; max-width: none; }
    .sidebar-nav { display: none; }
    .site-content {
      max-width: none;
      padding: 0;
    }
    .page-header, .page-body { display: none; }
    .site-footer { margin-top: 0; }
  </style>
</head>
<body>
  {% include header.html %}

  <div class="site-wrapper">
    <main class="site-content">
      <div id="redoc-container"></div>
    </main>
  </div>

  {% include footer.html %}

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('{{ page.spec_url | relative_url }}', {
      scrollYOffset: 56,
      theme: {
        colors: {
          primary: { main: '#3b82f6' }
        },
        typography: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          fontSize: '15px',
          headings: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }
        },
        sidebar: {
          width: '260px'
        }
      }
    }, document.getElementById('redoc-container'));
  </script>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
