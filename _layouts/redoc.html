<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    /* Minimal reset — let Redoc own everything below the header */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .spec-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .spec-header a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .spec-header nav {
      display: flex;
      gap: 1.25rem;
    }
    .spec-header nav a {
      color: #6b7280;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .spec-header nav a:hover { color: #1a1a1a; }
    #redoc-container { min-height: calc(100vh - 56px); }
  </style>
  {% seo %}
</head>
<body>
  <div class="spec-header">
    <a href="{{ '/' | relative_url }}">Ekklesia Docs</a>
    <nav>
      <a href="{{ '/api/' | relative_url }}">API Overview</a>
      <a href="{{ '/api/voting/' | relative_url }}">Voting API</a>
      <a href="{{ '/api/proposals/' | relative_url }}">Proposals API</a>
      <a href="{{ '/downloads/' | relative_url }}">Downloads</a>
    </nav>
  </div>

  <div id="redoc-container"></div>

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('{{ page.spec_url | relative_url }}', {
      scrollYOffset: 56,
      theme: {
        colors: {
          primary: { main: '#3b82f6' }
        },
        typography: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          fontSize: '15px',
          headings: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }
        },
        sidebar: {
          width: '260px'
        }
      }
    }, document.getElementById('redoc-container'));
  </script>
</body>
</html>
